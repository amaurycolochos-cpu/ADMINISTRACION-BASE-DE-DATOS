server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    # No se registra a si mismo, solo actua como servidor
    register-with-eureka: false
    fetch-registry: false
  server:
    wait-time-in-ms-when-sync-empty: 0

logging:
  level:
    root: INFO
    com.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG
