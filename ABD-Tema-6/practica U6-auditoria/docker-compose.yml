# =============================================================
# Docker Compose - Práctica 6.2: Monitoreo y Auditoría en PostgreSQL
# Materia: Administración de Base de Datos | Unidad 6
# Alumno: Mauri Gordillo
# =============================================================
# Este archivo levanta un contenedor PostgreSQL 16 configurado
# específicamente para prácticas de monitoreo y auditoría.
# Los scripts SQL en ./init/ se ejecutan automáticamente al crear
# el contenedor por primera vez (orden alfabético).
# =============================================================

services:
  postgres-audit:
    image: postgres:16
    container_name: postgres-audit
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: seguridad_db
      # Habilitar logging extendido para monitoreo
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "5432:5432"
    volumes:
      # Scripts de inicialización (se ejecutan en orden alfabético)
      - ./init:/docker-entrypoint-initdb.d:ro
      # Volumen persistente para datos
      - pgdata_audit:/var/lib/postgresql/data
      # Configuración personalizada de PostgreSQL (logging)
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    restart: unless-stopped

volumes:
  pgdata_audit:
