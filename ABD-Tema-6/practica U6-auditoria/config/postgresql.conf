# =============================================================
# PostgreSQL - Configuración personalizada para Monitoreo y Auditoría
# Práctica 6.2 - Administración de Base de Datos
# =============================================================
# Esta configuración habilita logging avanzado para poder
# demostrar el monitoreo de la actividad del SGBD.
# =============================================================

# --- Configuración básica ---
listen_addresses = '*'
max_connections = 100

# --- Configuración de LOGGING (fundamental para monitoreo) ---
logging_collector = on
log_destination = 'stderr'
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 10MB

# Registrar TODAS las conexiones y desconexiones
log_connections = on
log_disconnections = on

# Registrar todas las sentencias SQL ejecutadas
log_statement = 'all'

# Registrar duración de cada consulta
log_duration = on

# Registrar consultas que tarden más de 200ms
log_min_duration_statement = 200

# Formato del log con timestamp detallado
log_line_prefix = '%t [%p] %u@%d '

# --- Configuración de estadísticas (para pg_stat_activity) ---
track_activities = on
track_counts = on
track_io_timing = on

# --- Memoria compartida ---
shared_buffers = 128MB
work_mem = 4MB
