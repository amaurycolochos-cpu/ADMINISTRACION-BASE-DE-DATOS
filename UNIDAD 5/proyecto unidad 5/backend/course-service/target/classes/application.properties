# ===== Microservicio Course =====
# Puerto en el que Angular lo consume: http://<ip-linux>:8080
server.port=8080

# ===== Conexión a Oracle (en el mismo servidor Linux) =====
# Ajusta el SID/servicio segun tu instalacion (XEPDB1 para Oracle XE 21c).
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=CAMBIA_USUARIO
spring.datasource.password=CAMBIA_ESTA_CONTRASENA
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Dialecto Oracle (Spring Boot suele detectarlo, se deja explicito).
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
